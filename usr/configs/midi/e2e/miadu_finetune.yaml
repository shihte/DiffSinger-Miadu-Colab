# 基礎設定
base_config:
- usr/configs/popcs_ds_beta6.yaml
- usr/configs/midi/cascade/opencs/opencpop_statis.yaml

# 數據路徑
raw_data_dir: 'data/raw/miadu_finetune'
binary_data_dir: 'data/binary/miadu_finetune'
binarizer_cls: data_gen.singing.binarize.OpencpopBinarizer
processed_data_dir: 'data/processed/miadu_finetune'
dictionary: dictionaries/opencpop-strict.txt

# 訓練設定
work_dir: '/content/drive/MyDrive/DiffSinger_Upload_This/checkpoints_finetune/miadu_finetune_v1'
load_ckpt: '/content/drive/MyDrive/DiffSinger_Upload_This/checkpoints/1117_opencpop_ds1000_strict_pinyin/model_ckpt_steps_200000.ckpt'
task_cls: usr.diffsinger_task.DiffSingerMIDITask
use_midi: true
reset_phone_dict: false

# 聲碼器
vocoder: HifiGAN
vocoder_ckpt: /content/drive/MyDrive/DiffSinger_Upload_This/checkpoints/nsf_hifigan_44.1k_hop512_128bin_2024.02

# 硬件與性能 (Colab GPU 最佳化)
pl_trainer_accelerator: 'gpu'
pl_trainer_devices: 1
pl_trainer_precision: '32-true'
num_workers: 0 
ds_workers: 0 

# 核心架構對齊 (1117 模型參數)
test_num: 10
valid_num: 10
audio_sample_rate: 44100
audio_num_mel_bins: 128
keep_bins: 128
residual_channels: 512
hidden_size: 256
test_prefixes: ['Alto-1', 'Soprano-1', '2044', '2086', '2092', '2093', '2100']
fft_size: 2048
hop_size: 512
win_size: 2048
fmax: 16000
fmin: 40
timesteps: 1000
K_step: 1000
dilation_cycle_length: 4
dur_predictor_layers: 5
predictor_layers: 5

# 微調與保存策略 (Colab 安全增強)
optimizer_args:
  lr: 0.000005 
max_updates: 220000 
val_check_interval: 500  # 每 500 步驗證一次
num_ckpt_keep: 10        # 保留最近 10 個權重
check_val_every_n_epoch: null # 禁用按 Epoch 保存，強制按步數

# 推理穩定性增強
use_gt_dur: true
use_gt_f0: false # 音高還是讓模型自己預測，我們才聽得出進步

# 損失函數權重 (E2E 模式關鍵)
lambda_f0: 1.5
lambda_uv: 1.0
lambda_ph_dur: 1.5
lambda_word_dur: 1.5
lambda_sent_dur: 1.5

# 聲學模型細節
pe_enable: false 
spec_min: [-5]
spec_max: [0]
mel_vmin: -6.0
mel_vmax: 1.5
